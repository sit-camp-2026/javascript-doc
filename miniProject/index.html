<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="./index.js" defer type="module"></script>
    <title>Document</title>
  </head>

  <body>
    <section class="bg-zinc-100 min-h-screen grid-bg px-10 py-14 pb-20">
      <button
          id="buttonCal"
          class="mb-6 bg-red-500 col-end-7 text-white rounded-md hover:shadow-md hover:shadow-red-500/50 w-full py-2 cursor-pointer"
        >
          Calculate
        </button>


      <div class="border border-stone-200"></div>

      <div class="grid grid-cols-7 gap-3 mt-6">
        <select
          type="text"
          class="bg-white border border-stone-200 py-2 px-3 rounded-md w-full outline-none focus:border-lime focus:ring-1 focus:ring-lime/20 transition-all duration-150"
        >
          <option value="" disabled selected>Semester</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
        <button
          id="buttonReset"
          class="bg-red-500 col-end-7 text-white rounded-md hover:shadow-md hover:shadow-red-500/50 w-full py-2 cursor-pointer"
        >
          Reset
        </button>
        <button
          id="buttonAdd"
          class="bg-green-400 col-end-8 text-white text-green rounded-md hover:shadow-md hover:shadow-green-500/50 w-full py-2 cursor-pointer"
        >
          Add
        </button>
      </div>

      <!-- Grade calculator -->
      <div
        class="bg-white overflow-hidden rounded-md border border-stone-200 shadow-lg mt-3 p-6"
      >
        <div
          class="grid grid-cols-3 gap-3 bg-card border-b border-stone-200 text-sm tracking-[0.2em] uppercase text-muted text-xs pb-3"
        >
          <div>Course Name</div>
          <div>Grade</div>
          <div>Credits</div>
        </div>
        <div class="row grid grid-cols-3 gap-3 pt-3">
          <input
            type="text"
            placeholder="Subject"
            class="subject bg-base border border-stone-200 px-3 py-2 rounded-sm w-full outline-none focus:border-lime focus:ring-1 focus:ring-lime/20 transition-all duration-150"
          />
          <select
            type="text"
            class="gpa bg-base border border-stone-200 px-3 py-3 rounded-sm w-full outline-none focus:border-lime focus:ring-1 focus:ring-lime/20 transition-all duration-150"
          >
            <option value="" disabled selected>GPA</option>
            <option value="4">4</option>
            <option value="3.5">3.5</option>
            <option value="3">3</option>
            <option value="2.5">2.5</option>
            <option value="2">2</option>
            <option value="1.5">1.5</option>
            <option value="1">1</option>
          </select>
          <input
            type="text"
            placeholder="Credit"
            class="credit bg-base border border-stone-200 px-3 py-2 rounded-sm w-full outline-none focus:border-lime focus:ring-1 focus:ring-lime/20 transition-all duration-150"
          />
        </div>
        <div class="hidden" id="list"></div>
      </div>
      <div id="show-gpa-result" class="bg-white overflow-hidden rounded-md border border-stone-200 shadow-lg mt-3 p-6 hidden"></div>
    </section>
  </body>
</html>
